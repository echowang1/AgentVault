name: E2E Tests

on:
  push:
    branches:
      - main
      - task/**
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd server
          go mod download
          cd ../sdk
          npm ci

      - name: Build SDK
        run: |
          cd sdk
          npm run build

      - name: Run E2E tests
        env:
          E2E_API_KEY: test-api-key-e2e
          E2E_SERVER_URL: http://127.0.0.1:18080
          SHARD_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
        run: |
          cd sdk
          npm run test:e2e

      - name: Run performance tests
        env:
          E2E_API_KEY: test-api-key-e2e
          E2E_SERVER_URL: http://127.0.0.1:18080
          SHARD_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
        run: |
          cd sdk
          npm run test:perf
